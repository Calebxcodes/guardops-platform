name: CI / Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel any in-flight run for the same branch/PR — prevents deploy races
# and avoids wasting CI minutes on stale pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Validation (runs on every push and PR) ────────────────────────────────

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
        working-directory: backend

      - name: Run tests
        run: npm test --workspace=backend
        env:
          JWT_SECRET: ci-test-secret
          # DATABASE_URL is mocked in tests — value here is a sentinel for env guards
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_test

  build-frontend:
    name: Build Admin CRM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspace=frontend
        env:
          # Placeholder — real value only matters at runtime, not build time
          VITE_API_URL: https://placeholder.railway.app

  build-guard-app:
    name: Build Guard App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspace=guard-app
        env:
          VITE_API_URL: https://placeholder.railway.app

  # ── Deploy (master only, ALL validation jobs must pass) ───────────────────
  # Gating all three deploys on all three checks ensures a broken backend
  # doesn't let a frontend that depends on it reach production.

  deploy-backend:
    name: Deploy Backend → Railway
    if: github.ref == 'refs/heads/master'
    needs: [test-backend, build-frontend, build-guard-app]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy (waits for Railway health check)
        # Omitting --detach so the job blocks until Railway confirms the new
        # deployment is healthy — CI fails fast if the build or boot crashes.
        run: railway up --service backend
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-frontend:
    name: Deploy Admin CRM → Vercel
    if: github.ref == 'refs/heads/master'
    needs: [test-backend, build-frontend, build-guard-app]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

  deploy-guard-app:
    name: Deploy Guard App → Vercel
    if: github.ref == 'refs/heads/master'
    needs: [test-backend, build-frontend, build-guard-app]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: guard-app

  deploy-landing:
    name: Deploy Landing → Vercel
    if: github.ref == 'refs/heads/master'
    needs: [test-backend, build-frontend, build-guard-app]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: landing
