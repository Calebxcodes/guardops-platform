name: CI / Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Validation (runs on every push and PR) ─────────────────────────────────

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Type-check
      - name: Type check
        run: npx tsc --noEmit
        working-directory: backend

      # Unit tests (db is fully mocked — no real DB needed)
      - name: Run tests
        run: npm test --workspace=backend
        env:
          JWT_SECRET: ci-test-secret

  build-frontend:
    name: Build Admin CRM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # tsc + vite build — catches TS errors and broken imports
      - name: Build
        run: npm run build --workspace=frontend

  build-guard-app:
    name: Build Guard App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspace=guard-app

  # ── Deploy (master branch only, gated on validation jobs above) ─────────────

  deploy-backend:
    name: Deploy Backend → Railway
    if: github.ref == 'refs/heads/master'
    needs: test-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        # --detach returns immediately after upload; Railway builds asynchronously.
        # Remove --detach to make the job wait for Railway's health check.
        run: railway up --detach
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-frontend:
    name: Deploy Admin CRM → Vercel
    if: github.ref == 'refs/heads/master'
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      # vercel.json + .vercel/project.json already committed — CLI knows the project
      - name: Deploy
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

  deploy-guard-app:
    name: Deploy Guard App → Vercel
    if: github.ref == 'refs/heads/master'
    needs: build-guard-app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: guard-app

  deploy-landing:
    name: Deploy Landing → Vercel
    if: github.ref == 'refs/heads/master'
    # No dedicated build job for landing — it's a simple static site.
    # Vercel will reject a broken build and the deploy step will fail.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: landing
